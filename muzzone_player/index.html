<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>HLS Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .player-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-wrapper {
      position: relative;
      height: 100%;
      aspect-ratio: 16 / 9;
      max-width: 100%;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
      background-color: #000;
    }

    video::-webkit-media-controls {
      display: none !important;
    }

    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 15px;
      box-sizing: border-box;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: opacity 0.3s;
    }

    .live-container {
      display: flex;
      align-items: center;
    }
    .live-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #ff3b30;
      margin-right: 6px;
    }
    .live-text {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #fff;
      text-transform: uppercase;
    }

    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      box-sizing: border-box;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: opacity 0.3s;
    }

    .controls-left {
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .control-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 26px;
      margin-right: 20px;
      cursor: pointer;
      outline: none;
      line-height: 1;
      transition: opacity 0.2s;
    }
    .control-btn:hover {
      opacity: 0.7;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }

    .center-play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      background-color: rgba(0, 0, 0, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      padding: 24px;
      cursor: pointer;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 10;
      user-select: none;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
    }

    .center-play svg {
      display: block;
      width: 48px;
      height: 48px;
      fill: white;
      transition: transform 0.2s ease;
    }

    .center-play:hover svg {
      transform: scale(1.1);
    }

    .center-play.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .watch-archive-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin: 0 auto;
    }

    .watch-archive-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>

<div class="player-container" id="playerContainer">
  <div class="video-wrapper" id="videoWrapper">
    <video id="video"></video>

    <!-- Центрированная кнопка воспроизведения -->
    <div class="center-play" id="centerPlayBtn">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <polygon points="40,30 70,50 40,70" />
      </svg>
    </div>

    <div class="top-bar" id="topBar">
      <div class="live-container">
        <div class="live-indicator"></div>
        <div class="live-text">Live</div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="controls-left">
        <button class="control-btn" id="playPauseBtn">►</button>
        <button class="control-btn" id="muteBtn">🔈</button>
        <button class="control-btn" id="fullscreenBtn">⛶</button>
      </div>
      <button class="watch-archive-btn" onclick="window.location.href='dvr.html'">
        Смотреть запись эфира
      </button>
    </div>
  </div>
</div>

<script>
  const videoSrc = 'https://hls.live.31kz.adapto.kz/muzzone/index.m3u8';

  const video = document.getElementById('video');
  const playerContainer = document.getElementById('playerContainer');
  const videoWrapper = document.getElementById('videoWrapper');
  const topBar = document.getElementById('topBar');
  const bottomBar = document.getElementById('bottomBar');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const muteBtn = document.getElementById('muteBtn');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  const centerPlayBtn = document.getElementById('centerPlayBtn');

  function adjustSize() {
    const rect = playerContainer.getBoundingClientRect();
    const containerWidth = rect.width;
    const containerHeight = rect.height;
    const target = 16 / 9;

    let width = containerWidth;
    let height = width / target;

    if (height > containerHeight) {
      height = containerHeight;
      width = height * target;
    }

    videoWrapper.style.width = width + 'px';
    videoWrapper.style.height = height + 'px';
  }

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(videoSrc);
    hls.attachMedia(video);
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = videoSrc;
  } else {
    console.error('HLS не поддерживается в этом браузере.');
  }

  video.controls = false;

  playPauseBtn.addEventListener('click', () => {
    if (video.paused) {
      video.play();
    } else {
      video.pause();
    }
  });

  centerPlayBtn.addEventListener('click', () => {
    video.play();
  });

  video.addEventListener('play', () => {
    playPauseBtn.textContent = '❚❚';
    centerPlayBtn.classList.add('hidden');
    showControls();
  });

  video.addEventListener('pause', () => {
    playPauseBtn.textContent = '►';
    centerPlayBtn.classList.remove('hidden');
    centerPlayBtn.style.transform = 'translate(-50%, -50%) scale(0.9)';
    requestAnimationFrame(() => {
      centerPlayBtn.style.transform = 'translate(-50%, -50%) scale(1)';
    });
    topBar.classList.remove('hidden');
    bottomBar.classList.remove('hidden');
    clearTimeout(hideControlsTimeout);
  });

  muteBtn.addEventListener('click', () => {
    video.muted = !video.muted;
    muteBtn.textContent = video.muted ? '🔇' : '🔈';
  });

  fullscreenBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
      playerContainer.requestFullscreen?.();
      playerContainer.webkitRequestFullscreen?.();
      playerContainer.msRequestFullscreen?.();
    } else {
      document.exitFullscreen?.();
      document.webkitExitFullscreen?.();
      document.msExitFullscreen?.();
    }
  });

  let hideControlsTimeout;

  function showControls() {
    topBar.classList.remove('hidden');
    bottomBar.classList.remove('hidden');
    clearTimeout(hideControlsTimeout);
    if (!video.paused) {
      hideControlsTimeout = setTimeout(hideControls, 3000);
    }
  }

  function hideControls() {
    if (!video.paused) {
      topBar.classList.add('hidden');
      bottomBar.classList.add('hidden');
    }
  }

  playerContainer.addEventListener('mousemove', showControls);
  playerContainer.addEventListener('click', showControls);
  playerContainer.addEventListener('touchstart', showControls);
  video.addEventListener('play', showControls);
  showControls();

  // Keep strict 16:9 area centered within the iframe
  window.addEventListener('resize', adjustSize);
  window.addEventListener('orientationchange', adjustSize);
  adjustSize();
</script>

</body>
</html>
