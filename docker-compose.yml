services:
  media:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC
      - "9997:9997"   # API
    volumes:
      - ./media/mediamtx.yml:/mediamtx.yml
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ALLOWED_ORIGINS=http://localhost:3000
      - MEDIA_SERVER_URL=http://media:9997
    depends_on:
      - media
    restart: unless-stopped

  dashboard:
    build:
      context: ./dash
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_HLS_URL=http://localhost:8888
    depends_on:
      - api
    restart: unless-stopped

  player:
    build:
      context: ./player
      dockerfile: Dockerfile
    ports:
      - "3010:3010"
    environment:
      - PORT=3010
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - NODE_ENV=production
    restart: unless-stopped
