version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/api"
    schedule:
      interval: "weekly"
    groups:
      all-updates:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/dash"
    schedule:
      interval: "weekly"
    groups:
      all-updates:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      all-updates:
        patterns:
          - "*"
